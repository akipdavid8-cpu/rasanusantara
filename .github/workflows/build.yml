gname: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip Project
        run: unzip rasa-nusantara.zip -d project

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        working-directory: project
        run: npm install

      - name: Build Web
        working-directory: project
        run: npm run build

      - name: Fix Capacitor Config
        working-directory: project
        run: |
          cat > capacitor.config.json <<EOF
          {
            "appId": "com.akipdavid.rasanusantara",
            "appName": "Rasa Nusantara",
            "webDir": "dist"
          }
          EOF

      - name: Add Android Platform
        working-directory: project
        run: npx cap add android --skip-appid-validation

      - name: Sync Capacitor
        working-directory: project
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build APK
        working-directory: project/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rasa-nusantara-apk
          path: project/android/app/build/outputs/apk/debug/app-debug.apk
